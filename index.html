<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cuentacuentos ✨ — Nerea, Darío, Tiago</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-size: 16px; }
    body { max-width: 500px; margin: 0 auto; background: #f5f5f5; }
    #app { min-height: 100vh; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.3; }
    }
    @keyframes wavebar {
      from { height: 5px; }
      to   { height: 20px; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    input:focus { outline: none; }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ---- Stars background ---- */
    .stars-bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .star { position: absolute; opacity: 0.15; animation: twinkle var(--dur) ease-in-out var(--delay) infinite; }

    /* ---- Big Button ---- */
    .big-btn {
      background: var(--bg);
      border: none; border-radius: var(--radius, 24px);
      padding: var(--pad, 16px 28px);
      font-size: var(--fsize, 20px); font-family: 'Fredoka One', cursive; color: white;
      cursor: pointer;
      box-shadow: 0 6px 0 var(--shadow), 0 8px 20px var(--glow);
      transition: all 0.1s ease;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      user-select: none; touch-action: manipulation; width: 100%;
    }
    .big-btn:disabled { background: #ccc !important; box-shadow: none !important; cursor: default; }
    .big-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 var(--shadow) !important; }
    .big-btn .btn-emoji { font-size: 28px; }
    .big-btn.small { --radius: 16px; --pad: 10px 18px; --fsize: 16px; }
    .big-btn.small .btn-emoji { font-size: 20px; }

    /* ---- Card buttons (profile / category / character) ---- */
    .card-btn {
      background: white; border: 3px solid var(--color); border-radius: 24px;
      padding: 20px 12px; cursor: pointer;
      box-shadow: 0 6px 0 var(--shadow); transition: all 0.1s;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .card-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--shadow); }

    /* ---- Choice button (story) ---- */
    .choice-btn {
      border: none; border-radius: 20px; padding: 16px 18px; cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 6px 0 var(--shadow); transition: all 0.1s;
      width: 100%;
    }
    .choice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--shadow); }
    .choice-icon {
      width: 58px; height: 58px; background: rgba(255,255,255,0.3); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 34px; flex-shrink: 0;
    }
    .choice-text { font-family: 'Fredoka One', cursive; font-size: 19px; color: white; text-align: left; }

    /* ---- Profile row button ---- */
    .profile-btn {
      background: rgba(255,255,255,0.95); border: none; border-radius: 28px;
      padding: 15px 20px; display: flex; align-items: center; gap: 15px;
      cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s; width: 100%;
    }
    .profile-btn:hover { transform: scale(1.03); box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
    .profile-avatar {
      width: 58px; height: 58px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; flex-shrink: 0; border: 3px solid var(--color);
    }

    /* ---- Paragraph card ---- */
    .para-card {
      background: white; border-radius: 20px; padding: 15px 20px; margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08); animation: fadeSlide 0.5s ease;
    }
    .para-card.baby {
      border-radius: 24px; padding: 17px 20px; margin-bottom: 13px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08); border: 3px solid transparent;
      cursor: pointer; transition: all 0.3s;
    }
    .para-card.baby.speaking {
      background: #daf4f2; border-color: #4ECDC4; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .wave-bars { display: flex; gap: 4px; align-items: flex-end; margin-bottom: 8px; }
    .wave-bar {
      width: 5px; height: 14px; background: #4ECDC4; border-radius: 3px;
      animation: wavebar 0.6s ease-in-out infinite alternate;
    }

    /* ---- Misc helpers ---- */
    .animate-fadeSlide { animation: fadeSlide 0.5s ease; }
    .animate-bounce { animation: bounce 0.7s ease infinite; }
    .text-center { text-align: center; }
    .hidden { display: none !important; }

    /* ---- Mode buttons ---- */
    .mode-btn {
      border: none; border-radius: 28px; padding: 24px 28px; cursor: pointer;
      box-shadow: var(--shadow); transition: all 0.1s; text-align: left; width: 100%;
    }
    .mode-btn:active { transform: translateY(4px); }

    /* ---- Floating TTS button ---- */
    #fab-tts {
      position: fixed; bottom: 28px; right: 20px; z-index: 100;
      border: none; border-radius: 50%; width: 66px; height: 66px;
      font-size: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #fab-tts.idle {
      background: linear-gradient(135deg, #4ECDC4, #44b8af);
      box-shadow: 0 6px 20px rgba(78,205,196,0.5);
      transform: scale(1);
    }
    #fab-tts.speaking {
      background: linear-gradient(135deg, #FF6B9D, #ff8fb3);
      box-shadow: 0 6px 20px rgba(255,107,157,0.5);
      transform: scale(1.12);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ==================== SCREEN: PROFILES ==================== -->
  <div id="screen-profiles" class="screen active">
    <div style="min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;">
      <div class="stars-bg" id="stars-profiles"></div>
      <div style="position:relative;z-index:1;width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:28px;">
          <div style="font-size:72px;margin-bottom:8px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));">📖</div>
          <h1 style="font-family:'Fredoka One',cursive;font-size:36px;color:white;margin:0;text-shadow:0 3px 12px rgba(0,0,0,0.3);line-height:1.1;">Cuentacuentos ✨</h1>
          <p style="font-family:'Nunito',sans-serif;color:rgba(255,255,255,0.9);font-size:18px;margin:8px 0 0;">¿Quién va a leer hoy? 🌟</p>
        </div>

        <!-- Predefined profiles -->
        <div style="display:flex;flex-direction:column;gap:13px;margin-bottom:13px;" id="profiles-list"></div>

        <!-- Custom profile toggle -->
        <div id="custom-toggle-btn">
          <button onclick="showCustomForm()" style="width:100%;background:rgba(255,255,255,0.18);border:3px dashed rgba(255,255,255,0.6);border-radius:28px;padding:15px 20px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:all 0.2s;"
            onmouseenter="this.style.background='rgba(255,255,255,0.28)'" onmouseleave="this.style.background='rgba(255,255,255,0.18)'">
            <div style="width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:30px;border:3px dashed rgba(255,255,255,0.6);flex-shrink:0;">➕</div>
            <div style="text-align:left;">
              <div style="font-size:20px;color:white;font-family:'Fredoka One',cursive;">Otro niño</div>
              <div style="font-size:13px;color:rgba(255,255,255,0.8);font-family:'Nunito',sans-serif;font-weight:600;">¡Escribe tu nombre! ✏️</div>
            </div>
          </button>
        </div>

        <!-- Custom profile form -->
        <div id="custom-form" class="hidden" style="background:rgba(255,255,255,0.97);border-radius:28px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.15);animation:fadeSlide 0.3s ease;">
          <p style="font-family:'Fredoka One',cursive;font-size:18px;color:#333;margin:0 0 11px;text-align:center;">¿Cómo te llamas? ✏️</p>
          <input id="custom-name-input" type="text" placeholder="Escribe tu nombre..." maxlength="20"
            oninput="updateCustomSubmit()" onkeydown="if(event.key==='Enter') submitCustom()"
            style="width:100%;border:3px solid #A78BFA;border-radius:16px;padding:11px 15px;font-size:20px;font-family:'Fredoka One',cursive;color:#333;outline:none;box-sizing:border-box;margin-bottom:13px;" />
          <p style="font-family:'Fredoka One',cursive;font-size:15px;color:#555;margin:0 0 9px;text-align:center;">¿Qué modo quieres?</p>
          <div style="display:flex;gap:10px;margin-bottom:13px;">
            <button id="mode-child-btn" onclick="selectCustomMode('child')"
              style="flex:1;background:#FFE4F0;border:3px solid #FF6B9D;border-radius:18px;padding:11px 6px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:15px;color:#FF6B9D;transition:all 0.15s;">
              📚 Niño
            </button>
            <button id="mode-baby-btn" onclick="selectCustomMode('baby')"
              style="flex:1;background:#E0F7F5;border:3px solid #4ECDC4;border-radius:18px;padding:11px 6px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:15px;color:#4ECDC4;transition:all 0.15s;">
              🌟 Bebé
            </button>
          </div>
          <div style="display:flex;gap:10px;">
            <button onclick="hideCustomForm()"
              style="flex:1;background:#eee;border:none;border-radius:16px;padding:11px;cursor:pointer;font-family:'Fredoka One',cursive;font-size:15px;color:#888;">
              ⬅️ Volver
            </button>
            <button id="custom-submit-btn" onclick="submitCustom()" disabled
              style="flex:2;background:#ddd;border:none;border-radius:16px;padding:11px;cursor:default;font-family:'Fredoka One',cursive;font-size:16px;color:white;transition:all 0.15s;">
              ¡Empezar! 🚀
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ==================== SCREEN: MODE ==================== -->
  <div id="screen-mode" class="screen">
    <div style="min-height:100vh;background:linear-gradient(135deg,#A78BFA33 0%,#A78BFA11 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;">
      <div class="stars-bg" id="stars-mode"></div>
      <div style="position:relative;z-index:1;width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-size:72px;" id="mode-avatar"></div>
          <h2 style="font-family:'Fredoka One',cursive;font-size:30px;color:#333;margin:8px 0 4px;" id="mode-hello"></h2>
          <p style="font-family:'Nunito',sans-serif;color:#666;font-size:16px;margin:0;">¿Cómo quieres tu cuento?</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <button class="mode-btn" onclick="selectMode('child')"
            style="background:linear-gradient(135deg,#FF6B9D,#ff8fb3);--shadow:0 8px 0 #cc4477, 0 10px 30px #FF6B9D44;"
            onmousedown="this.style.transform='translateY(4px)'" onmouseup="this.style.transform='translateY(0)'" onmouseleave="this.style.transform='translateY(0)'">
            <div style="font-size:48px;margin-bottom:4px;">📚</div>
            <div style="font-family:'Fredoka One',cursive;font-size:26px;color:white;">Modo Niño</div>
            <div style="font-family:'Nunito',sans-serif;font-size:14px;color:rgba(255,255,255,0.9);font-weight:600;">Para 6-8 años · Leer y elegir 📖</div>
          </button>
          <button class="mode-btn" onclick="selectMode('baby')"
            style="background:linear-gradient(135deg,#4ECDC4,#7eddd7);--shadow:0 8px 0 #2aa39b, 0 10px 30px #4ECDC444;"
            onmousedown="this.style.transform='translateY(4px)'" onmouseup="this.style.transform='translateY(0)'" onmouseleave="this.style.transform='translateY(0)'">
            <div style="font-size:48px;margin-bottom:4px;">🌟</div>
            <div style="font-family:'Fredoka One',cursive;font-size:26px;color:white;">Modo Bebé</div>
            <div style="font-family:'Nunito',sans-serif;font-size:14px;color:rgba(255,255,255,0.9);font-weight:600;">Para 2-5 años · Iconos y voz 🔊</div>
          </button>
        </div>
        <div style="margin-top:20px;">
          <button class="big-btn small" style="--bg:#aaa;--shadow:#88888888;--glow:#aaaaaa22;" onclick="goTo('profiles')">
            <span class="btn-emoji">⬅️</span> Volver
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== SCREEN: CATEGORY ==================== -->
  <div id="screen-category" class="screen">
    <div style="min-height:100vh;background:linear-gradient(180deg,#FFF9F0 0%,#FFE4B5 100%);padding:24px 20px;position:relative;">
      <div class="stars-bg" id="stars-category"></div>
      <div style="max-width:440px;margin:0 auto;position:relative;z-index:1;">
        <div style="text-align:center;margin-bottom:26px;">
          <div style="font-size:52px;" id="cat-avatar"></div>
          <h2 style="font-family:'Fredoka One',cursive;font-size:27px;color:#333;margin:8px 0 4px;" id="cat-hello"></h2>
          <p style="font-family:'Nunito',sans-serif;color:#888;font-size:15px;margin:0;">¿Qué tipo de cuento quieres?</p>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px;" id="categories-grid"></div>
        <button class="big-btn small" style="--bg:#aaa;--shadow:#88888888;--glow:#aaaaaa22;" id="cat-back-btn" onclick="catGoBack()">
          <span class="btn-emoji">⬅️</span> Volver
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== SCREEN: CHARACTER ==================== -->
  <div id="screen-character" class="screen">
    <div id="char-wrapper" style="min-height:100vh;padding:24px 20px;position:relative;">
      <div class="stars-bg" id="stars-character"></div>
      <div style="max-width:440px;margin:0 auto;position:relative;z-index:1;">
        <div style="text-align:center;margin-bottom:26px;">
          <div style="font-size:52px;" id="char-cat-emoji"></div>
          <h2 style="font-family:'Fredoka One',cursive;font-size:27px;color:#333;margin:8px 0 4px;">¡Elige tu personaje! ✨</h2>
          <p style="font-family:'Nunito',sans-serif;color:#888;font-size:15px;margin:0;">¿Quién será el protagonista?</p>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px;" id="characters-grid"></div>
        <button class="big-btn small" style="--bg:#aaa;--shadow:#88888888;--glow:#aaaaaa22;" onclick="goTo('category')">
          <span class="btn-emoji">⬅️</span> Volver
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== SCREEN: STORY ==================== -->
  <div id="screen-story" class="screen">
    <div id="story-wrapper" style="min-height:100vh;padding-bottom:120px;">

      <!-- Header -->
      <div id="story-header" style="padding:20px 20px 28px;border-radius:0 0 32px 32px;box-shadow:0 8px 24px rgba(0,0,0,0.15);">
        <div style="display:flex;align-items:center;gap:12px;max-width:440px;margin:0 auto;" id="story-header-child">
          <div style="font-size:36px;" id="story-char-emoji-child"></div>
          <div>
            <h1 style="font-family:'Fredoka One',cursive;font-size:21px;color:white;margin:0;text-shadow:0 2px 8px rgba(0,0,0,0.2);" id="story-title-child"></h1>
            <div style="font-family:'Nunito',sans-serif;font-size:13px;color:rgba(255,255,255,0.9);font-weight:700;" id="story-meta-child"></div>
          </div>
        </div>
        <div style="max-width:440px;margin:0 auto;text-align:center;" id="story-header-baby" class="hidden">
          <div style="font-size:60px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.2));" id="story-char-emoji-baby"></div>
          <h1 style="font-family:'Fredoka One',cursive;font-size:23px;color:white;margin:8px 0 4px;text-shadow:0 2px 8px rgba(0,0,0,0.2);" id="story-title-baby"></h1>
          <div style="font-family:'Nunito',sans-serif;font-size:14px;color:rgba(255,255,255,0.95);font-weight:700;" id="story-meta-baby"></div>
        </div>
      </div>

      <!-- Content -->
      <div style="max-width:440px;margin:0 auto;padding:22px 20px;" id="story-content">
        <!-- paragraphs injected here -->
      </div>

      <!-- Loading -->
      <div id="story-loading" class="hidden" style="text-align:center;padding:32px;">
        <div style="font-size:56px;" id="story-loading-emoji" class="animate-bounce">⭐</div>
        <p style="font-family:'Fredoka One',cursive;font-size:22px;color:#4ECDC4;" id="story-loading-text">¡Espera un momento! ✨</p>
      </div>

      <!-- Choices -->
      <div id="story-choices" class="hidden" style="max-width:440px;margin:0 auto;padding:0 20px 20px;animation:fadeSlide 0.5s ease;"></div>

      <!-- Finished -->
      <div id="story-finished" class="hidden" style="max-width:440px;margin:20px auto;padding:0 20px;animation:fadeSlide 0.5s ease;">
        <div id="story-finished-inner" style="border-radius:28px;padding:24px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.12);">
          <div style="font-size:64px;" id="finished-emoji">🌟</div>
          <p style="font-family:'Fredoka One',cursive;font-size:26px;color:white;margin:8px 0 16px;" id="finished-text">¡Muy bien!</p>
          <button class="big-btn" style="--bg:white;--shadow:#ddddddaa;--glow:#ffffff22;" onclick="handleRestart()">
            <span class="btn-emoji">🏠</span><span style="color:#FF6B9D;">¡Otro cuento!</span>
          </button>
        </div>
      </div>

      <div id="story-end-anchor"></div>

      <!-- Floating TTS button (baby mode only) -->
      <button id="fab-tts" class="idle hidden" onclick="toggleTTS()">🔊</button>
    </div>
  </div>

</div>

<script>
// ==================== DATA ====================
const PROFILES = [
  { id: 1, name: "Nerea", avatar: "👧", color: "#FF6B9D", bgColor: "#FFE4F0", mode: "child" },
  { id: 2, name: "Darío", avatar: "👦", color: "#4ECDC4", bgColor: "#E0F7F5", mode: "baby" },
  { id: 3, name: "Tiago", avatar: "🧒", color: "#FFB347", bgColor: "#FFF3E0", mode: "baby" },
];

const CATEGORIES = [
  { id: "cartoons",    label: "Dibujos Animados", emoji: "📺", color: "#FF6B9D" },
  { id: "disney",      label: "Disney",           emoji: "🏰", color: "#9B59B6" },
  { id: "superheroes", label: "Superhéroes",       emoji: "🦸", color: "#E74C3C" },
  { id: "paw",         label: "Patrulla Canina",   emoji: "🐾", color: "#3498DB" },
  { id: "sports",      label: "Deportes",          emoji: "⚽", color: "#2ECC71" },
  { id: "travel",      label: "Viajes",            emoji: "✈️", color: "#F39C12" },
];

const CHARACTERS = {
  cartoons:    [{ id:"peppa",   name:"Peppa Pig",     emoji:"🐷" },{ id:"bluey",   name:"Bluey",         emoji:"🐕" },{ id:"bob",     name:"Bob Esponja",   emoji:"🧽" },{ id:"tom",     name:"Tom y Jerry",   emoji:"🐱" }],
  disney:      [{ id:"elsa",    name:"Elsa",          emoji:"❄️" },{ id:"simba",   name:"Simba",         emoji:"🦁" },{ id:"moana",   name:"Moana",         emoji:"🌊" },{ id:"buzz",    name:"Buzz Lightyear",emoji:"🚀" }],
  superheroes: [{ id:"spidey",  name:"Spider-Man",    emoji:"🕷️" },{ id:"batman",  name:"Batman",        emoji:"🦇" },{ id:"wonder",  name:"Wonder Woman",  emoji:"⭐" },{ id:"super",   name:"Superman",      emoji:"🦸" }],
  paw:         [{ id:"chase",   name:"Chase",         emoji:"🐾" },{ id:"marshall",name:"Marshall",      emoji:"🚒" },{ id:"skye",    name:"Skye",          emoji:"🚁" },{ id:"rubble",  name:"Rubble",        emoji:"🏗️" }],
  sports:      [{ id:"futbol",  name:"Fútbol",        emoji:"⚽" },{ id:"basket",  name:"Baloncesto",    emoji:"🏀" },{ id:"natacion",name:"Natación",      emoji:"🏊" },{ id:"tenis",   name:"Tenis",         emoji:"🎾" }],
  travel:      [{ id:"space",   name:"El Espacio",    emoji:"🚀" },{ id:"jungle",  name:"La Selva",      emoji:"🌿" },{ id:"ocean",   name:"El Océano",     emoji:"🌊" },{ id:"mountains",name:"Las Montañas",  emoji:"⛰️" }],
};

// ==================== STATE ====================
let state = {
  screen: "profiles",
  profile: null,
  mode: null,
  category: null,
  character: null,
  // story state
  storyData: null,
  storyTitle: "",
  paragraphs: [],
  loading: false,
  showChoices: false,
  chapterCount: 0,
  finished: false,
  // baby TTS
  speaking: false,
  currentSpeakIdx: -1,
  parasRef: [],
  // custom form
  customMode: null,
};

// ==================== STARS ====================
function buildStars(containerId) {
  const container = document.getElementById(containerId);
  if (!container || container.dataset.built) return;
  container.dataset.built = "1";
  for (let i = 0; i < 20; i++) {
    const el = document.createElement("div");
    el.className = "star";
    const dur  = (Math.random() * 3 + 2).toFixed(2);
    const delay= (Math.random() * 3).toFixed(2);
    el.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;font-size:${Math.random()*20+8}px;--dur:${dur}s;--delay:${delay}s;`;
    el.textContent = "⭐";
    container.appendChild(el);
  }
}

// ==================== ROUTING ====================
function goTo(screenName) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + screenName).classList.add("active");
  state.screen = screenName;
  if (screenName === "profiles") buildStars("stars-profiles");
  if (screenName === "mode")     { buildStars("stars-mode"); renderModeScreen(); }
  if (screenName === "category") { buildStars("stars-category"); renderCategoryScreen(); }
  if (screenName === "character"){ buildStars("stars-character"); renderCharacterScreen(); }
  if (screenName === "story")    renderStoryScreen();
  window.scrollTo(0,0);
}

}

}

function updateCustomSubmit() {

  const btn  = document.getElementById("custom-submit-btn");

}
function submitCustom() {
  const name = document.getElementById("custom-name-input").value.trim();

  state.profile = { id:99, name, avatar:"🧒", color:"#A78BFA", bgColor:"#EDE9FE", mode: state.customMode };

}

// ==================== STORY INIT ====================
function startStory() {
  // Reset story state
  state.storyData     = null;
  state.storyTitle    = "";
  state.paragraphs    = [];
  state.loading       = false;
  state.showChoices   = false;
  state.chapterCount  = 0;
  state.finished      = false;
  state.speaking      = false;
  state.currentSpeakIdx = -1;
  state.parasRef      = [];
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  goTo("story");
}

function renderStoryScreen() {
  const { profile, category, character, mode } = state;

  // Background & header color
  const storyWrapper = document.getElementById("story-wrapper");
  const storyHeader  = document.getElementById("story-header");

  if (mode === "baby") {
    storyWrapper.style.background = "linear-gradient(180deg,#E8F4FD 0%,#B8E0FF 100%)";

    document.getElementById("story-header-baby").classList.remove("hidden");
    document.getElementById("story-char-emoji-baby").textContent = character.emoji;
    document.getElementById("story-title-baby").textContent      = `El cuento de ${character.name}`;
    document.getElementById("story-meta-baby").textContent       = `${profile.avatar} ${profile.name} · ${category.emoji} ${category.label}`;
    document.getElementById("fab-tts").classList.remove("hidden");

    document.getElementById("story-loading-text").textContent  = "¡Espera un momento! ✨";
  } else {
    storyWrapper.style.background = "linear-gradient(180deg,#FFFDE7 0%,#FFF9C4 100%)";
    storyHeader.style.background  = `linear-gradient(135deg,${category.color},${category.color}cc)`;
    document.getElementById("story-header-baby").classList.add("hidden");
    document.getElementById("story-header-child").classList.remove("hidden");
    document.getElementById("story-char-emoji-child").textContent = character.emoji;
    document.getElementById("story-title-child").textContent      = `El cuento de ${character.name}`;
    document.getElementById("story-meta-child").textContent       = `${profile.avatar} ${profile.name} · ${category.emoji} ${category.label}`;
    document.getElementById("fab-tts").classList.add("hidden");
    document.getElementById("story-loading-emoji").textContent = "✍️";
    document.getElementById("story-loading-text").textContent  = "Escribiendo el cuento...";

  // Reset UI

  document.getElementById("story-finished").classList.add("hidden");
  setLoading(false);

  // Load story
  loadInitialStory();
}

// ==================== API ====================
async function generateStory(character, category, playerName, mode, choiceContext="") {
  const modeInstructions = mode === "baby"
    ? "Escribe para niños de 2-5 años. Usa frases MUY cortas (máximo 8 palabras). Vocabulario simplísimo. Muchas onomatopeyas. Texto alegre. Máximo 3 párrafos cortos."
    : "Escribe para niños de 6-8 años. Frases cortas con algo más de detalle. Máximo 4 párrafos. Vocabulario sencillo pero rico.";

  const prompt = choiceContext
    ? `Continúa el cuento de ${character.name} para ${playerName}. Categoría: ${category.label}. ${modeInstructions}
El niño eligió: "${choiceContext}"
Continúa la historia. Al final incluye una pregunta con exactamente 3 opciones.
RESPONDE SOLO EN JSON sin texto adicional:
{"paragraphs":["p1","p2","p3"],"question":"¿Qué hace ${playerName} ahora?","choices":[{"emoji":"🌟","text":"Opción 1"},{"emoji":"🌈","text":"Opción 2"},{"emoji":"⭐","text":"Opción 3"}]}`
    : `Crea el INICIO de un cuento para ${playerName} protagonizado por ${character.name} (${character.emoji}) en categoría ${category.label}. ${modeInstructions}
Incluye a ${playerName} como amigo del protagonista. Al final incluye una pregunta con exactamente 3 opciones.
RESPONDE SOLO EN JSON sin texto adicional:
{"title":"Título del cuento","paragraphs":["p1","p2","p3"],"question":"¿Qué hace ${playerName} ahora?","choices":[{"emoji":"🌟","text":"Opción 1"},{"emoji":"🌈","text":"Opción 2"},{"emoji":"⭐","text":"Opción 3"}]}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await response.json();
  const text = (data.content || []).map(i => i.text || "").join("");
  try {
    return JSON.parse(text.replace(/```json|```/g, "").trim());
  } catch {
    return {
      title: "Un cuento mágico",
      paragraphs: ["Había una vez una gran aventura...", "Y fue muy divertida.", "¿Qué pasará después?"],
      question: "¿Qué hacemos ahora?",
      choices: [{ emoji:"🌟",text:"Ir al bosque"},{ emoji:"🏠",text:"Volver a casa"},{ emoji:"🎉",text:"Hacer una fiesta"}],
    };
  }
}

// ==================== STORY LOGIC ====================
async function loadInitialStory() {
  setLoading(true);
  const { character, category, profile, mode } = state;
  const data = await generateStory(character, category, profile.name, mode);
  state.storyTitle = data.title || `El cuento de ${character.name}`;
  state.storyData  = data;
  // Update title in header
  if (mode === "baby") document.getElementById("story-title-baby").textContent = state.storyTitle;
  else                 document.getElementById("story-title-child").textContent = state.storyTitle;
  setLoading(false);

  if (mode === "baby") {
    state.parasRef = [];
    revealSequenceBaby(data.paragraphs || [], 0, data.question);
  } else {
    revealParasChild(data.paragraphs || []);
  }
}

// ---------- CHILD mode ----------
let childTimers = [];
function revealParasChild(newParas) {
  childTimers.forEach(clearTimeout);
  childTimers = [];
  newParas.forEach((text, i) => {
    const t = setTimeout(() => {
      addParaChild(text);
      if (i === newParas.length - 1) {
        const t2 = setTimeout(() => showChoices(), 600);
        childTimers.push(t2);
      }
    }, i * 900);
    childTimers.push(t);
  });
}

function addParaChild(text) {
  const cat = state.category;
  const div = document.createElement("div");
  div.className = "para-card";
  div.style.borderLeft = `4px solid ${cat.color}`;
  div.innerHTML = `<p style="font-family:'Nunito',sans-serif;font-size:17px;line-height:1.7;color:#333;margin:0;">${text}</p>`;
  document.getElementById("story-content").appendChild(div);
  state.paragraphs.push(text);
  scrollEnd();
}

// ---------- BABY mode ----------
function revealSequenceBaby(paras, startIdx, question) {
  let i = 0;
  const next = () => {
    if (i >= paras.length) {
      speak(question || "¿Qué hacemos ahora?", 9000, () => {
        setTimeout(() => showChoices(), 300);
      });
      return;
    }
    const globalIdx = startIdx + i;
    const text = paras[i];
    state.parasRef.push(text);
    addParaBaby(text, globalIdx);
    i++;
    speak(text, globalIdx, () => { setTimeout(next, 350); });
  };
  setTimeout(next, 400);
}

function addParaBaby(text, idx) {
  const div = document.createElement("div");
  div.className = "para-card baby";
  div.id = `para-baby-${idx}`;
  div.onclick = () => speakByIdx(idx);
  div.innerHTML = `
    <div class="wave-bars" id="wave-${idx}" style="display:none;">
      <div class="wave-bar" style="animation-delay:0s;"></div>
      <div class="wave-bar" style="animation-delay:0.15s;"></div>
      <div class="wave-bar" style="animation-delay:0.3s;"></div>
      <span style="font-family:'Fredoka One',cursive;font-size:13px;color:#4ECDC4;margin-left:6px;">Leyendo...</span>
    </div>
    <p style="font-family:'Nunito',sans-serif;font-size:20px;line-height:1.8;color:#333;margin:0;font-weight:700;">${text}</p>
    <div style="text-align:right;margin-top:5px;font-size:11px;color:#aaa;font-family:'Nunito',sans-serif;">🔊 Toca para escuchar</div>
  `;
  document.getElementById("story-content").appendChild(div);
  state.paragraphs.push(text);
  scrollEnd();
}

// ---------- Choices ----------
function showChoices() {
  if (!state.storyData || state.finished) return;
  state.showChoices = true;
  const container = document.getElementById("story-choices");
  container.classList.remove("hidden");
  const mode = state.mode;
  const isBaby = mode === "baby";

  const wrapper = document.createElement("div");
  wrapper.style.cssText = isBaby
    ? "background:linear-gradient(135deg,#FFE4B5,#FFD700);border-radius:28px;padding:22px 18px;box-shadow:0 8px 24px rgba(0,0,0,0.12);border:3px solid #FFB347;text-align:center;"
    : `background:${state.category.color}22;border-radius:24px;padding:20px;border:3px solid ${state.category.color};margin-top:8px;`;

  const qEmoji = isBaby ? `<div style="font-size:52px;margin-bottom:6px;">🤔</div>` : `<div style="text-align:center;font-size:32px;margin-bottom:8px;">🤔</div>`;
  const qStyle = isBaby
    ? "font-family:'Fredoka One',cursive;font-size:21px;color:#333;margin:0 0 18px;"
    : "font-family:'Fredoka One',cursive;font-size:20px;color:#333;text-align:center;margin:0 0 16px;";

  wrapper.innerHTML = `${qEmoji}<p style="${qStyle}">${state.storyData.question}</p>`;

  const choicesDiv = document.createElement("div");
  choicesDiv.style.cssText = "display:flex;flex-direction:column;gap:" + (isBaby ? "13" : "10") + "px;";

  const colors  = ["#FF6B9D", "#4ECDC4", "#FFB347"];
  const shadows = ["#cc4477", "#2aa39b", "#cc8800"];

  (state.storyData.choices || []).forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.style.background  = colors[i];
    btn.style.setProperty("--shadow", shadows[i]);
    btn.innerHTML = `
      <div class="choice-icon">${choice.emoji}</div>
      <span class="choice-text">${choice.text}</span>
    `;
    btn.onclick = () => handleChoice(choice);
    choicesDiv.appendChild(btn);
  });

  wrapper.appendChild(choicesDiv);
  container.appendChild(wrapper);
  scrollEnd();
}

async function handleChoice(choice) {
  document.getElementById("story-choices").innerHTML = "";
  document.getElementById("story-choices").classList.add("hidden");
  state.showChoices = false;
  if (window.speechSynthesis) { window.speechSynthesis.cancel(); setSpeaking(false); }

  if (state.chapterCount >= 3) {
    const isBaby = state.mode === "baby";
    if (isBaby) {
      const endText = `¡Muy bien ${state.profile.name}! ¡Has terminado el cuento! ¡Bravo!`;
      addParaBaby(`🌟 ${endText}`, state.parasRef.length);
      state.parasRef.push(`🌟 ${endText}`);
      speak(endText, 9999, null);
    } else {
      addParaChild(`🌟 ¡Y colorín colorado, este cuento ha acabado! ${state.profile.name} y ${state.character.name} vivieron felices para siempre. 🎉`);
    }
    showFinished();
    return;
  }

  setLoading(true);
  state.chapterCount++;
  const data = await generateStory(state.character, state.category, state.profile.name, state.mode, choice.text);
  state.storyData = data;
  setLoading(false);

  if (state.mode === "baby") {
    const startIdx = state.parasRef.length;
    revealSequenceBaby(data.paragraphs || [], startIdx, data.question);
  } else {
    revealParasChild(data.paragraphs || []);
  }
}

function showFinished() {
  state.finished = true;
  const isBaby = state.mode === "baby";
  const inner  = document.getElementById("story-finished-inner");
  if (isBaby) {
    inner.style.background = "linear-gradient(135deg,#FFD700,#FFA500)";
    document.getElementById("finished-emoji").textContent = "🌟";
    document.getElementById("finished-text").textContent  = "¡Muy bien!";
  } else {
    inner.style.background = "linear-gradient(135deg,#FFD700,#FFA500)";
    document.getElementById("finished-emoji").textContent = "🏆";
    document.getElementById("finished-text").textContent  = "¡Cuento terminado!";
  }
  document.getElementById("story-finished").classList.remove("hidden");
  scrollEnd();
}

function handleRestart() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  state.mode = null; state.category = null; state.character = null;
  goTo("profiles");
}

// ---------- Helpers ----------
function setLoading(val) {
  state.loading = val;
  const el = document.getElementById("story-loading");
  if (val) { el.classList.remove("hidden"); scrollEnd(); }
  else       el.classList.add("hidden");
}

function scrollEnd() {
  setTimeout(() => {
    document.getElementById("story-end-anchor")?.scrollIntoView({ behavior: "smooth" });
  }, 50);
}

// ==================== TTS ====================
function speak(text, idx, onDone) {
  if (!window.speechSynthesis) { setTimeout(() => onDone?.(), 1000); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "es-ES"; u.rate = 0.82; u.pitch = 1.2;
  setSpeaking(true, idx);
  u.onend  = () => { setSpeaking(false); onDone?.(); };
  u.onerror= () => { setSpeaking(false); onDone?.(); };
  window.speechSynthesis.speak(u);
}

function setSpeaking(val, idx = -1) {
  state.speaking      = val;
  state.currentSpeakIdx = val ? idx : -1;

  // Update FAB
  const fab = document.getElementById("fab-tts");
  if (val) { fab.classList.remove("idle"); fab.classList.add("speaking"); fab.textContent = "⏸️"; }
  else     { fab.classList.remove("speaking"); fab.classList.add("idle"); fab.textContent = "🔊"; }

  // Update paragraph highlight (baby)
  document.querySelectorAll(".para-card.baby").forEach(card => {
    card.classList.remove("speaking");
    const waveId = card.querySelector("[id^='wave-']")?.id;
    if (waveId) document.getElementById(waveId).style.display = "none";
  });

  if (val && idx >= 0) {
    const card = document.getElementById(`para-baby-${idx}`);
    if (card) {
      card.classList.add("speaking");
      const wave = document.getElementById(`wave-${idx}`);
      if (wave) wave.style.display = "flex";
    }
  }
}

function speakByIdx(idx) {
  const text = state.parasRef[idx];
  if (text) speak(text, idx, null);
}

function toggleTTS() {
  if (state.speaking) {
    window.speechSynthesis?.cancel();
    setSpeaking(false);
  } else {
    const lastIdx = state.parasRef.length - 1;
    if (lastIdx >= 0) speakByIdx(lastIdx);
  }
}

// ==================== BOOT ====================
renderProfilesScreen();
buildStars("stars-profiles");
</script>
